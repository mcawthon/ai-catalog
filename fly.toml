# fly.toml app configuration file generated for ai-catalog on 2026-06-16T06:56:26-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-catalog'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
